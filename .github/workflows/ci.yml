name: CI

on:
  pull_request:
    branches: [main]

jobs:
  scan_ruby:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Brakeman
        run: bundle exec brakeman --no-pager -q

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: RuboCop
        run: bundle exec rubocop --parallel -f github

  test:
    runs-on: ubuntu-latest

    env:
      RAILS_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Setup database
        run: bin/rails db:schema:load

      - name: RSpec
        run: bundle exec rspec

      - name: Zeitwerk
        run: bin/rails zeitwerk:check

      - name: Check coverage
        run: |
          COVERAGE=$(ruby -e "
            require 'json'
            data = JSON.parse(File.read('coverage/.last_run.json'))
            puts data['result']['line'].to_i
          ")
          echo "Coverage: ${COVERAGE}%"
          if [ "$COVERAGE" -lt 90 ]; then
            echo "❌ Coverage abaixo de 90% (atual: ${COVERAGE}%)"
            exit 1
          fi
          echo "✅ Coverage OK (${COVERAGE}%)"

  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: critical
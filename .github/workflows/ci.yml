name: CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  scan_ruby:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Brakeman
        run: bundle exec brakeman --no-pager -q

      - name: Zeitwerk
        run: bin/rails zeitwerk:check
        env:
          RAILS_ENV: test

  lint:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: RuboCop
        run: bundle exec rubocop --parallel -f github

  test:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    env:
      RAILS_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Setup database
        run: bin/rails db:schema:load

      - name: RSpec
        run: bundle exec rspec --format progress

      - name: Check coverage
        run: |
          COVERAGE=$(ruby -e "
            require 'json'
            data = JSON.parse(File.read('coverage/.last_run.json'))
            puts data['result']['line'].to_i
          ")
          echo "Coverage: ${COVERAGE}%"
          if [ "$COVERAGE" -lt 90 ]; then
            echo "❌ Coverage abaixo de 90% (atual: ${COVERAGE}%)"
            exit 1
          fi
          echo "✅ Coverage OK (${COVERAGE}%)"

  dependency-review:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: critical

  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy no Render
        run: |
          curl -f -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -H "Content-Type: application/json"